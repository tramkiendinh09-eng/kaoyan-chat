<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI 考研答疑">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="spark" x1="20" y1="14" x2="44" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9d5ff"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- main AI sparkle: a 4-point star, the universal AI glyph -->
  <path d="M32 13c1.4 9.1 4.9 12.6 14 14-9.1 1.4-12.6 4.9-14 14-1.4-9.1-4.9-12.6-14-14 9.1-1.4 12.6-4.9 14-14Z" fill="url(#spark)"/>
  <!-- secondary small sparkle -->
  <path d="M46 38c.6 3.4 1.9 4.7 5.3 5.3-3.4.6-4.7 1.9-5.3 5.3-.6-3.4-1.9-4.7-5.3-5.3 3.4-.6 4.7-1.9 5.3-5.3Z" fill="#ffffff" fill-opacity="0.92"/>
  <!-- neural node accents -->
  <circle cx="16" cy="20" r="2.1" fill="#ffffff" fill-opacity="0.85"/>
  <circle cx="18" cy="46" r="1.7" fill="#ffffff" fill-opacity="0.7"/>
</svg>
